<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALITRAIN — Summer Body Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --gold: #c9a96e;
    --gold-dim: #8a6f42;
    --dark: #111010;
    --dark2: #181818;
    --dark3: #1f1f1f;
    --dark4: #2a2a2a;
    --border: rgba(255,255,255,0.06);
    --text: #e8e4de;
    --muted: #666;
    --accent: #c9a96e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; padding-bottom: 100px; }
  button { cursor: pointer; font-family: inherit; }

  /* ── HEADER ── */
  .header {
    background: rgba(17,16,16,0.97);
    backdrop-filter: blur(12px);
    padding: 16px 24px;
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .header-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 3px; color: var(--gold-dim); margin-bottom: 3px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: #fff; font-weight: 300; font-style: italic; letter-spacing: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .profile-btn {
    background: none; border: 1px solid var(--border); border-radius: 4px;
    padding: 7px 14px; font-family: 'Space Mono', monospace; font-size: 8px;
    font-weight: 700; color: var(--muted); letter-spacing: 2px; cursor: pointer;
    transition: all 0.2s;
  }
  .profile-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .asthma-btn {
    background: none; border: 1px solid rgba(239,68,68,0.3); border-radius: 4px;
    padding: 7px 14px; display: flex; align-items: center; gap: 6px;
    font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700;
    color: #ef4444; letter-spacing: 2px; cursor: pointer; transition: all 0.2s;
  }
  .tier-badge { display: inline-block; padding: 2px 8px; border-radius: 2px; font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700; margin-left: 8px; vertical-align: middle; letter-spacing: 1px; }

  /* ── STREAK BAR ── */
  .streak-bar { background: var(--dark2); border-bottom: 1px solid var(--border); padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; }
  .streak-left { display: flex; align-items: center; gap: 10px; }
  .streak-fire { font-size: 14px; }
  .streak-count { font-family: 'Cormorant Garamond', serif; font-size: 22px; color: var(--gold); font-weight: 300; }
  .streak-label { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); letter-spacing: 2px; margin-top: 1px; }
  .streak-progress { flex: 1; margin: 0 20px; }
  .streak-prog-label { font-family: 'Space Mono', monospace; font-size: 7px; color: var(--muted); margin-bottom: 5px; text-align: right; letter-spacing: 1px; }
  .streak-prog-bg { height: 1px; background: var(--dark4); border-radius: 1px; overflow: hidden; }
  .streak-prog-fill { height: 100%; border-radius: 1px; background: var(--gold); transition: width 0.5s ease; }

  /* ── WEEK NAV ── */
  .week-strip { display: flex; background: var(--dark2); border-bottom: 1px solid var(--border); }
  .week-day { flex: 1; min-width: 38px; text-align: center; padding: 14px 4px 12px; cursor: pointer; position: relative; transition: background 0.2s; }
  .week-day:hover:not(.rest) { background: rgba(255,255,255,0.02); }
  .week-day.rest { cursor: default; opacity: 0.25; }
  .week-day-top-bar { position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--border); transition: all 0.3s; }
  .week-day.active .week-day-top-bar { background: var(--accent); }
  .week-day.done .week-day-top-bar { background: var(--gold); box-shadow: 0 0 8px var(--gold), 0 0 20px rgba(201,169,110,0.4); }
  .week-day.active.done .week-day-top-bar { background: var(--accent); box-shadow: 0 0 10px var(--accent), 0 0 28px rgba(201,169,110,0.5); }
  .week-day-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; }
  .week-day.active .week-day-label { color: var(--gold); }
  .week-day.done .week-day-label { color: var(--gold-dim); }
  .week-day-num { font-size: 9px; color: var(--muted); font-weight: 600; font-family: 'Space Mono', monospace; }
  .week-day.active .week-day-num { color: #fff; }
  .week-day.done .week-day-num { color: var(--gold); }

  /* ── DAY TABS ── */
  .day-tabs { display: flex; background: var(--dark2); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .day-tab { flex: 1; min-width: 54px; padding: 10px 2px; font-family: 'Space Mono', monospace; font-size: 8px; font-weight: 700; letter-spacing: 2px; color: var(--muted); border: none; border-bottom: 1px solid transparent; margin-bottom: -1px; background: none; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .day-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  /* ── ADMIN PANEL ── */
  .admin-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:700;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.25s; }
  .admin-overlay.open { opacity:1;pointer-events:all; }
  .admin-card { background:var(--dark2);border:1px solid var(--border);padding:28px 24px;width:100%;max-width:380px; }
  .admin-title { font-family:'Cormorant Garamond',serif;font-size:22px;color:#fff;margin-bottom:4px;font-weight:300; }
  .admin-sub { font-size:9px;color:var(--muted);margin-bottom:22px;font-family:'Space Mono',monospace;letter-spacing:2px; }
  .admin-btn { width:100%;padding:12px;background:var(--gold);border:none;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#000;letter-spacing:2px;cursor:pointer;margin-top:4px; }
  .admin-setting-row { display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border); }
  .admin-setting-label { font-size:13px;color:var(--text); }
  .admin-setting-sub { font-size:10px;color:var(--muted);margin-top:2px; }
  .admin-setting-input { width:60px;background:var(--dark3);border:1px solid var(--border);padding:6px 9px;font-size:13px;color:var(--text);font-family:'Space Mono',monospace;text-align:center;outline:none; }
</style>
</head>
<body>

<header class="header">
  <div>
    <div class="header-label" id="headerLabel">EST. 2026</div>
    <div class="header-title">CALITRAIN</div>
  </div>
</header>

<div class="streak-bar">
  <div class="streak-left">
    <div class="streak-fire">🔥</div>
    <div>
      <div class="streak-count" id="streakCount">0</div>
      <div class="streak-label">DAY STREAK</div>
    </div>
  </div>
</div>

<div class="week-strip" id="weekStrip"></div>
<div class="day-tabs" id="dayTabs"></div>

<div class="admin-overlay" id="adminOverlay">
  <div class="admin-card">
    <div class="admin-title">Admin Controls</div>
    <div class="admin-sub">Manual Data Override</div>
    <div class="admin-setting-row">
      <div>
        <div class="admin-setting-label">Override Streak</div>
        <div class="admin-setting-sub">Set your daily streak manually</div>
      </div>
      <input class="admin-setting-input" id="settingStreakOverride" type="number" min="0" value="0" />
    </div>
    <button class="admin-btn" onclick="applyStreakOverride()">SET STREAK</button>
    <div id="streakOverrideMsg" style="color:#4ade80; font-size:10px; margin-top:10px; display:none;"></div>
    <button class="admin-btn" style="background:#333; color:#ccc; margin-top:10px" onclick="document.getElementById('adminOverlay').classList.remove('open')">CLOSE</button>
  </div>
</div>

<script>
  const DAYS = [
    { name: 'Monday', accent: '#c9a96e' },
    { name: 'Tuesday', accent: '#c9a96e' },
    { name: 'Wednesday', accent: '#c9a96e' },
    { name: 'Thursday', accent: '#c9a96e' },
    { name: 'Friday', accent: '#c9a96e' },
    { name: 'Saturday', accent: '#c9a96e' },
    { name: 'Sunday', accent: '#c9a96e' }
  ];
  let activeDay = new Date().getDay() === 0 ? 6 : new Date().getDay() - 1;

  function render(){
    const d = DAYS[activeDay];
    document.documentElement.style.setProperty('--accent', d.accent);
    
    const headerLabel = document.getElementById('headerLabel');
    if(headerLabel) headerLabel.style.color = d.accent;

    // FIX: Removed the non-existent goalBanner reference that was crashing the app
    
    renderWeek();
    updateStreakBar();
  }

  function renderWeek() {
    const strip = document.getElementById('weekStrip');
    strip.innerHTML = DAYS.map((d, i) => `
      <div class="week-day ${i === activeDay ? 'active' : ''}" onclick="activeDay=${i}; render();">
        <div class="week-day-top-bar"></div>
        <div class="week-day-label">${d.name.substring(0,3).toUpperCase()}</div>
        <div class="week-day-num">${i + 1}</div>
      </div>
    `).join('');
  }

  function updateStreakBar() {
    const dates = JSON.parse(localStorage.getItem('calitrainDates') || "[]");
    document.getElementById('streakCount').textContent = dates.length;
  }

  // NEW: Manual streak override function
  function applyStreakOverride() {
    const val = parseInt(document.getElementById('settingStreakOverride').value);
    if(isNaN(val) || val < 0) return;
    
    const dates = [];
    const checkDate = new Date();
    for(let i=0; i < val; i++) {
      dates.push(checkDate.toISOString().split('T')[0]);
      checkDate.setDate(checkDate.getDate() - 1);
    }
    
    localStorage.setItem('calitrainDates', JSON.stringify(dates.reverse()));
    
    const msg = document.getElementById('streakOverrideMsg');
    if(msg) {
      msg.textContent = `Streak overridden to ${val} days!`;
      msg.style.display = 'block';
      setTimeout(() => msg.style.display = 'none', 3000);
    }
    
    updateStreakBar();
  }

  // Initial render
  window.onload = render;
</script>

</body>
</html>
